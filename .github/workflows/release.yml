name: Create Release

on:
  workflow_dispatch:
    inputs:
      build-ver:
        description: Build version
        required: true
        default: v0.0.0

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: FactionFixLoader
        path: artifact

    - name: Create Release Zip
      run: |
        mkdir -p release
        cp -a artifact/FactionFixLoader.dll release/
        cd release
        zip -r ../FactionFixLoader-${{ github.event.inputs.build-ver }}.zip .
        cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.build-ver }}
        name: ${{ github.event.inputs.build-ver }}
        files: |
          FactionFixLoader-${{ github.event.inputs.build-ver }}.zip
        draft: false
        prerelease: false
        make_latest: true
